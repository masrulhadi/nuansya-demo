<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F3D22"/>
      <stop offset="100%" stop-color="#1B6B3A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#2D8A52" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2D8A52" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glowBL)"/>

  <!-- Geometric ornament circles -->
  <circle cx="60" cy="60" r="180" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.08"/>
  <circle cx="60" cy="60" r="120" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.06"/>
  <circle cx="1140" cy="570" r="220" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.08"/>
  <circle cx="1140" cy="570" r="150" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.06"/>

  <!-- Arabic letter ن watermark -->
  <text x="600" y="280" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
    font-size="320" fill="#C9A84C" opacity="0.06">ن</text>

  <!-- Gold top border accent -->
  <rect x="0" y="0" width="1200" height="5" fill="#C9A84C" opacity="0.7"/>

  <!-- Left accent bar -->
  <rect x="100" y="160" width="4" height="310" rx="2" fill="#C9A84C" opacity="0.4"/>

  <!-- Main logo mark -->
  <rect x="122" y="170" width="72" height="72" rx="16" fill="#C9A84C" opacity="0.15" stroke="#C9A84C" stroke-width="1.5"/>
  <text x="158" y="222" text-anchor="middle" font-family="Georgia,serif" font-size="44" fill="#E8C97A">ن</text>

  <!-- NUANSYA wordmark -->
  <text x="210" y="228" font-family="Georgia,'Times New Roman',serif"
    font-size="56" font-weight="bold" fill="#E8C97A" letter-spacing="3">NUANSYA</text>

  <!-- Subtitle -->
  <text x="210" y="265" font-family="Arial,Helvetica,sans-serif"
    font-size="18" fill="#C9A84C" opacity="0.8" letter-spacing="1">
    Nusantara Analytics for Syariah Assets
  </text>

  <!-- Divider line -->
  <rect x="108" y="295" width="984" height="1.5" fill="#C9A84C" opacity="0.2"/>

  <!-- Main headline -->
  <text x="108" y="355" font-family="Georgia,'Times New Roman',serif"
    font-size="38" font-weight="bold" fill="white">
    Platform ZISWAF Digital dari Gampong ke Nasional
  </text>

  <!-- Description -->
  <text x="108" y="400" font-family="Arial,Helvetica,sans-serif"
    font-size="22" fill="white" opacity="0.65">
    Offline-first · AI Scoring Mustahik · Transparansi Publik · Patuh Regulasi
  </text>

  <!-- Stats pills -->
  <!-- Pill 1 -->
  <rect x="108" y="430" width="220" height="58" rx="12" fill="#C9A84C" opacity="0.12" stroke="#C9A84C" stroke-width="1.5"/>
  <text x="218" y="453" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#E8C97A">Rp327 Triliun</text>
  <text x="218" y="475" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" opacity="0.55">Potensi Zakat Nasional</text>

  <!-- Pill 2 -->
  <rect x="344" y="430" width="180" height="58" rx="12" fill="#C9A84C" opacity="0.12" stroke="#C9A84C" stroke-width="1.5"/>
  <text x="434" y="453" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#E8C97A">87,6% Gap</text>
  <text x="434" y="475" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" opacity="0.55">Belum Terealisasi</text>

  <!-- Pill 3 -->
  <rect x="540" y="430" width="180" height="58" rx="12" fill="#C9A84C" opacity="0.12" stroke="#C9A84C" stroke-width="1.5"/>
  <text x="630" y="453" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#E8C97A">Bottom-Up</text>
  <text x="630" y="475" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" opacity="0.55">Dari Gampong ke Pusat</text>

  <!-- Right side tag -->
  <rect x="920" y="430" width="172" height="58" rx="12" fill="#1B6B3A" stroke="#2D8A52" stroke-width="1.5"/>
  <text x="1006" y="453" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#E8C97A" letter-spacing="1">DIGDAYA X 2026</text>
  <text x="1006" y="473" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="white" opacity="0.6">Tim Youser_Root</text>

  <!-- Footer -->
  <rect x="0" y="595" width="1200" height="35" fill="#0A2A17" opacity="0.6"/>
  <text x="600" y="617" text-anchor="middle" font-family="Arial,sans-serif"
    font-size="14" fill="white" opacity="0.45" letter-spacing="1">
    UIN Ar-Raniry Banda Aceh · Pusat Inovasi Digital Indonesia (PIDI) · Asta Cita No. 6
  </text>
</svg>
